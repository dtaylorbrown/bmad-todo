# Compose (install Docker Desktop or the Compose plugin; then either works):
#   docker compose build && docker compose up -d
#   docker-compose build && docker-compose up -d
#
# No Compose CLI? Use plain Docker:
#   chmod +x docker/run-stack.sh && ./docker/run-stack.sh
#
# Web only with compose: docker compose build web && docker compose up -d --no-deps web

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      SQLITE_PATH: /data/todos.db
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - api-data:/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        VITE_API_URL: http://localhost:3001
    ports:
      - "3000:8080"
    restart: unless-stopped

volumes:
  api-data:
